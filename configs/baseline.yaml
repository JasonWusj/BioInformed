# Baseline config: UNet2D with Dice loss only (no biophysics regularisation)
# Compare with default.yaml to see the effect of PDE + BC losses
# Optimized for RTX 3080 (10GB VRAM)

data:
  data_dir: "./data/BraTS2023"
  preprocessed_dir: "./data/preprocessed"
  use_fast_loader: true
  num_workers: 4  # RTX 3080服务器通常有足够CPU核心
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  slice_axis: 2
  input_size: [256, 256]
  modalities: ["t1", "t1ce", "t2", "flair"]
  num_channels: 4
  num_classes: 4

model:
  backbone: "unet2d"
  features: [32, 64, 128, 256, 512]
  density_estimator:
    hidden_dim: 128
    num_layers: 2
    feature_size: [8, 8]

training:
  epochs: 100
  batch_size: 32
  lr: 3.0e-4  # 256x256 + batch32 需要较低lr防止梯度爆炸
  weight_decay: 1.0e-5
  scheduler: "cosine"
  grad_clip: 1.0  # gradient clipping max_norm
  amp: true

loss:
  use_biophysics: false  # <-- 关键区别：仅使用 Dice loss
  lambda_pde: 1.0
  lambda_bc: 1.0
  d_range: [0.02, 1.5]
  rho_range: [0.002, 0.2]

seed: 42
output_dir: "./outputs_baseline"
