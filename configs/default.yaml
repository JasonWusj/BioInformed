# Biophysics Informed Segmentation - 2D UNet Config
# Optimized for RTX 3080 (10GB VRAM)

data:
  data_dir: "./data/BraTS2023"
  preprocessed_dir: "./data/preprocessed"  # .npy预处理目录
  use_fast_loader: true  # true: 从.npy加载(需先运行preprocess.py), false: 从NIfTI加载
  num_workers: 4  # RTX 3080服务器通常有足够CPU核心
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  slice_axis: 2  # axial slices (along z-axis)
  input_size: [256, 256]
  modalities: ["t1", "t1ce", "t2", "flair"]
  num_channels: 4
  num_classes: 4  # background, TC, WT, ET

model:
  backbone: "unet2d"
  features: [32, 64, 128, 256, 512]
  density_estimator:
    hidden_dim: 128
    num_layers: 2
    feature_size: [8, 8]  # spatial size of intermediate features for density estimation

training:
  epochs: 100
  batch_size: 32
  lr: 3.0e-4  # 256x256 + batch32 需要较低lr防止梯度爆炸
  weight_decay: 1.0e-5
  scheduler: "cosine"
  grad_clip: 1.0  # gradient clipping max_norm
  amp: true  # 混合精度，节省显存并加速

loss:
  use_biophysics: true  # false: 仅Dice loss (baseline), true: Dice + PDE + BC
  lambda_pde: 5.0
  lambda_bc: 5.0
  d_range: [0.02, 1.5]   # diffusion coefficient range (mm^2/day)
  rho_range: [0.002, 0.2]  # proliferation rate range (1/day)

seed: 42
output_dir: "./outputs"
